<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asahi Cafe 旗艦系統</title>
  <style>
    :root { --main-brown: #8D6E63; --light-brown: #E0DCD5; --accent-green: #6B8E23; --bg: #FAF9F6; }
    body { font-family: 'PingFang TC', sans-serif; background: var(--bg); color: #5D4037; margin: 0; padding: 15px; }
    .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
    .btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-mgr { background: var(--main-brown); color: white; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin: 15px 0; }
    .cal-day { padding: 10px 2px; background: #FFF; border: 1px solid #EEE; border-radius: 6px; font-size: 12px; cursor: pointer; position: relative; }
    .cal-day.today { border: 2px solid var(--accent-green); }
    .cal-day.has-event { background: #FFF8E1; }
    .badge { font-size: 9px; display: block; margin-top: 2px; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 15px; padding: 20px; }
    input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #DDD; box-sizing: border-box; }
    .status-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin: 2px; color: white; }
  </style>
</head>
<body>

<div class="card">
  <div id="login-ui">
    <h3>☕ Asahi Cafe 登入</h3>
    <select id="login-name"><option value="">選擇人員</option><option value="Gino">Gino</option><option value="陳品潔">陳品潔</option><option value="Izumi">Izumi</option><option value="山本勇太">山本勇太</option><option value="Manager">店長模式</option></select>
    <input type="password" id="login-pwd" placeholder="請輸入密碼" inputmode="numeric">
    <button class="btn btn-mgr" onclick="handleLogin()">進入系統</button>
  </div>

  <div id="main-ui" style="display:none;">
    <h3 id="welcome-msg">你好</h3>
    <div id="punch-area" style="display: flex; gap: 10px;">
      <button class="btn" style="background:var(--accent-green); color:white;" onclick="doPunch('上班')">🌅 上班打卡</button>
      <button class="btn" style="background:#BC8F8F; color:white;" onclick="doPunch('下班')">🌇 下班打卡</button>
    </div>

    <div id="calendar-area">
      <div style="display:flex; justify-content: space-between; align-items: center; margin-top:20px;">
        <h4 id="cal-month-title"></h4>
        <button id="mgr-lock-btn" class="btn" style="width:80px; font-size:12px; display:none;" onclick="toggleLock()"></button>
      </div>
      <div class="calendar" id="cal-grid"></div>
    </div>

    <div id="hist-area" style="margin-top:20px; border-top:1px solid #EEE;">
      <h4 style="margin-bottom:10px;">近期紀錄</h4>
      <div id="hist-content" style="font-size:13px;"></div>
    </div>
    <p style="font-size:11px; color:#CCC; cursor:pointer;" onclick="localStorage.clear(); location.reload();">登出系統</p>
  </div>
</div>

<div id="action-modal" class="modal">
  <div class="modal-content">
    <h4 id="modal-date"></h4>
    <div id="modal-body"></div>
    <button class="btn" onclick="closeModal()">取消</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwQTu5RDDcYKFmwcbUsAdE1mN-YbUeIG0vQvfPj3p3meqJ52UG1ulY7PA7IyQof5oYU/exec";
  let user = { name: "", pwd: "", isManager: false };
  let db = { config: [], schedule: [], unavail: [], locked: false };

  async function handleLogin() {
    const n = document.getElementById('login-name').value;
    const p = document.getElementById('login-pwd').value;
    callGAS({ mode: 'login', name: n, password: p }, (res) => {
      if (res.status === 'success') {
        user = { name: n, pwd: p, isManager: res.isManager };
        localStorage.setItem('asahi_user', JSON.stringify(user));
        initApp();
      } else { alert("驗證失敗"); }
    });
  }

  function initApp() {
    const saved = localStorage.getItem('asahi_user');
    if (saved) { user = JSON.parse(saved); document.getElementById('login-ui').style.display = 'none'; document.getElementById('main-ui').style.display = 'block'; refreshData(); }
  }

  function refreshData() {
    document.getElementById('welcome-msg').innerText = "你好，" + user.name;
    callGAS({ mode: 'get_month_data', name: user.name, password: user.pwd }, (res) => {
      db = res;
      renderCalendar();
      fetchHistory();
      if (user.isManager) {
        document.getElementById('mgr-lock-btn').style.display = 'block';
        document.getElementById('mgr-lock-btn').innerText = db.locked ? "🔓 解鎖" : "🔒 鎖定";
      }
    });
  }

  function renderCalendar() {
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = "";
    const now = new Date();
    document.getElementById('cal-month-title').innerText = `${now.getMonth()+1}月班表 ${db.locked ? '(已鎖定)' : ''}`;
    const days = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    
    for (let i = 1; i <= days; i++) {
      const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      const div = document.createElement('div');
      div.className = 'cal-day';
      if (i === now.getDate()) div.classList.add('today');
      
      const dayConfig = db.config.find(c => formatDate(c[0]) === dateStr);
      const slots = dayConfig ? JSON.parse(dayConfig[1]) : getDefaultSlots(new Date(dateStr).getDay());
      const takers = db.schedule.filter(s => formatDate(s[1]) === dateStr);
      
      div.innerHTML = `<b>${i}</b><br><span class="badge">${takers.length}/${slots.length}人</span>`;
      div.onclick = () => showActionModal(dateStr, slots, takers);
      grid.appendChild(div);
    }
  }

  function showActionModal(date, slots, takers) {
    const modal = document.getElementById('action-modal');
    const body = document.getElementById('modal-body');
    document.getElementById('modal-date').innerText = date;
    
    let html = "";
    if (user.isManager) {
      html += `<h5>店長佈局管理</h5>`;
      slots.forEach((s, idx) => {
        const taker = takers.find(t => t[2] == idx);
        html += `<div style="border-bottom:1px solid #EEE; padding:5px 0;">名額${idx+1}: ${s.time} [${taker ? taker[3] : '缺'}]</div>`;
      });
      html += `<button class="btn" style="background:#EEE" onclick="mgrConfigDate('${date}')">修改本日名額時間</button>`;
    } else {
      html += `<h5>排班情形</h5>`;
      slots.forEach((s, idx) => {
        const taker = takers.find(t => t[2] == idx);
        if (taker) html += `<div class="status-tag" style="background:#6B8E23">${taker[3]} (${s.time})</div>`;
        else if (!db.locked) html += `<button class="btn" onclick="staffGrab('${date}', ${idx})">搶班: ${s.time}</button>`;
      });
      
      const unavails = db.unavail.filter(u => formatDate(u[1]) === date);
      html += `<h5>備援資訊</h5>`;
      unavails.forEach(u => html += `<div class="status-tag" style="background:#BC8F8F">❌ ${u[2]} 不能來</div>`);
      
      if (!db.locked) {
        const myUnavail = unavails.find(u => u[2] === user.name);
        if (myUnavail) html += `<button class="btn" style="background:#F5F5F5; color:#666" onclick="staffAction('${date}', 'cancel_unavail')">我有空了，取消標記</button>`;
        else html += `<button class="btn" style="background:#FDF2F2; color:#D32F2F" onclick="staffAction('${date}', 'unavail')">標記我這天不能支援</button>`;
      }
    }
    
    body.innerHTML = html;
    modal.style.display = 'flex';
  }

  // --- API 呼叫 ---
  function staffGrab(date, slotId) { staffAction(date, 'grab', slotId); }
  function staffAction(date, action, slotId = "") {
    callGAS({ mode: 'staff_action', name: user.name, password: user.pwd, date: date, action: action, slotId: slotId }, (res) => {
      if (res.status === 'success') { closeModal(); refreshData(); } else { alert(res.message); }
    });
  }

  function mgrConfigDate(date) {
    const num = prompt("需要幾個人？", "2");
    const time = prompt("時間？", "11:00-18:00");
    if (!num || !time) return;
    const slots = Array.from({length: parseInt(num)}, () => ({time: time}));
    callGAS({ mode: 'manager_set_config', name: user.name, password: user.pwd, date: date, slots: JSON.stringify(slots) }, (res) => {
      closeModal(); refreshData();
    });
  }

  function toggleLock() {
    callGAS({ mode: 'set_lock', name: user.name, password: user.pwd, lock: !db.locked }, refreshData);
  }

  function doPunch(type) {
    navigator.geolocation.getCurrentPosition(pos => {
      callGAS({ mode: 'punch', name: user.name, password: user.pwd, type: type, lat: pos.coords.latitude, lon: pos.coords.longitude }, (res) => {
        alert(res.message); fetchHistory();
      });
    }, () => alert("定位失敗"), {enableHighAccuracy: true});
  }

  // --- 小工具 ---
  function getDefaultSlots(day) {
    const count = (day >= 2 && day <= 4) ? 1 : 2;
    return Array.from({length: count}, () => ({time: "11:00-18:00"}));
  }
  function callGAS(p, cb) {
    const cbN = 'cb' + Date.now() + Math.floor(Math.random()*100);
    window[cbN] = (d) => { cb(d); delete window[cbN]; document.body.removeChild(s); };
    let url = GAS_URL + "?callback=" + cbN;
    for (let k in p) url += `&${k}=${encodeURIComponent(p[k])}`;
    const s = document.createElement('script'); s.src = url; document.body.appendChild(s);
  }
  function formatDate(d) { return new Date(d).toISOString().split('T')[0]; }
  function closeModal() { document.getElementById('action-modal').style.display = 'none'; }
  document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
