<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Asahi Cafe 旗艦系統</title>
  <style>
    :root { --main-brown: #8D6E63; --accent-green: #6B8E23; --bg: #FAF9F6; --light-pink: #FFE4E1; --gray-bar: #E0E0E0; }
    body { font-family: -apple-system, "PingFang TC", sans-serif; background: var(--bg); color: #5D4037; margin: 0; padding: 10px; }
    .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 500px; margin: auto; min-height: 90vh; display: flex; flex-direction: column; }
    .btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; }
    
    /* 頁籤設計 */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 12px; border: 1px solid #DDD; background: #FFF; border-radius: 12px; font-weight: bold; color: #999; cursor: pointer; transition: 0.2s; font-size: 15px; }
    .tab-btn.active { background: var(--main-brown); color: #FFF; border-color: var(--main-brown); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* 月曆視覺設計 */
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin: 15px 0; }
    .cal-day { background: #FFF; border: 1px solid #F0F0F0; border-radius: 8px; min-height: 95px; padding: 4px 2px; cursor: pointer; display: flex; flex-direction: column; align-items: center; position: relative; }
    .cal-day.today { background: #FFFDE7; border: 2px solid #FFD54F; }
    .cal-day.selected { border: 2px solid var(--main-brown); box-shadow: inset 0 0 5px rgba(141,110,99,0.3); }
    
    .event-top { font-size: 9px; color: #F57C00; font-weight: bold; height: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; width: 100%; }
    .date-num { font-weight: bold; font-size: 14px; margin: 2px 0; }
    
    .slot-container { width: 95%; display: flex; flex-direction: column; gap: 2px; margin-top: 2px; }
    .slot-bar { height: 16px; background: var(--gray-bar); border-radius: 4px; font-size: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; color: transparent; }
    .slot-bar.occupied { background: #D7CCC8; color: var(--main-brown); font-weight: bold; }
    
    .unavail-container { width: 95%; display: flex; flex-direction: column; gap: 2px; margin-top: auto; padding-top: 5px; }
    .unavail-tag { background: var(--light-pink); font-size: 9px; color: #D81B60; padding: 2px 0; border-radius: 3px; text-align: center; }
    
    .selected-bar { background: var(--main-brown); color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; text-align: center; display: none; }
    .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:1000; padding:15px; }
    .modal-content { background:white; width:100%; max-width:360px; border-radius:15px; padding:20px; }
    input, select { width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #DDD; font-size: 15px; }
  </style>
</head>
<body>

<div class="card">
  <div id="login-ui">
    <h2 style="text-align:center; margin-bottom:30px;">☕ Asahi Cafe</h2>
    <select id="login-name">
      <option value="">選擇人員</option>
      <option value="Gino">Gino</option>
      <option value="陳品潔">陳品潔</option>
      <option value="Izumi">Izumi</option>
      <option value="山本勇太">山本勇太</option>
    </select>
    <input type="password" id="login-pwd" placeholder="輸入 4 位數密碼" inputmode="numeric">
    <button class="btn" style="background:var(--main-brown); color:white;" onclick="handleLogin('staff')">進入系統</button>
    <div style="text-align:center; margin-top:80px;">
        <span style="color:#FDFDFD; font-size:10px; cursor:pointer;" onclick="showAdminPrompt()">Admin</span>
    </div>
  </div>

  <div id="main-ui" style="display:none; flex-grow: 1; flex-direction: column;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
      <h3 id="welcome-msg" style="margin:0;">你好</h3>
      <button id="mgr-lock-btn" class="btn" style="width:90px; padding:6px; font-size:11px; display:none; margin:0;" onclick="toggleLock()"></button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="btn-tab-punch" onclick="switchTab('punch')">📍 出勤打卡</button>
      <button class="tab-btn" id="btn-tab-cal" onclick="switchTab('cal')">📅 月曆排班</button>
    </div>

    <div id="tab-punch" class="tab-content active" style="margin-top: 20px;">
      <button class="btn" style="background:var(--accent-green); color:white; padding: 20px; font-size: 18px;" onclick="doPunch('上班')">🌅 上班打卡</button>
      <button class="btn" style="background:#BC8F8F; color:white; padding: 20px; font-size: 18px; margin-top: 15px;" onclick="doPunch('下班')">🌇 下班打卡</button>
      <p style="text-align: center; color: #999; font-size: 12px; margin-top: 20px;">請確保您在店面附近進行打卡</p>
    </div>

    <div id="tab-cal" class="tab-content">
      <div id="selected-bar" class="selected-bar">
        <span id="sel-count-text">已選擇 0 天</span>
        <button class="btn" style="background:white; color:var(--main-brown); margin:8px 0 0 0; padding:6px;" onclick="showBatchAction()">處理所選日期</button>
      </div>

      <div style="display:flex; justify-content:center; align-items:center; gap:25px; margin-bottom:5px;">
        <button onclick="changeMonth(-1)" style="border:none; background:none; font-size:22px; cursor:pointer; color:var(--main-brown);">◀</button>
        <h4 id="cal-month-title" style="margin:0; min-width: 110px; text-align:center;"></h4>
        <button onclick="changeMonth(1)" style="border:none; background:none; font-size:22px; cursor:pointer; color:var(--main-brown);">▶</button>
      </div>
      
      <div class="calendar" id="cal-grid"></div>
    </div>

    <button class="btn" style="background:#F5F5F5; color:#999; margin-top:auto;" onclick="logout()">登出</button>
  </div>
</div>

<div id="action-modal" class="modal">
  <div class="modal-content">
    <h3 id="modal-date" style="margin-top:0;"></h3>
    <div id="modal-body"></div>
    <button class="btn" style="background:#F5F5F5" onclick="closeModal()">關閉</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwQTu5RDDcYKFmwcbUsAdE1mN-YbUeIG0vQvfPj3p3meqJ52UG1ulY7PA7IyQof5oYU/exec";
  let user = { name: "", pwd: "", isManager: false };
  let db = { config: [], schedule: [], unavail: [], locked: false };
  let currentDisplayDate = new Date();
  let selectedDates = [];

  function switchTab(tabId) {
    document.getElementById('tab-punch').classList.remove('active');
    document.getElementById('tab-cal').classList.remove('active');
    document.getElementById('btn-tab-punch').classList.remove('active');
    document.getElementById('btn-tab-cal').classList.remove('active');
    
    document.getElementById('tab-' + tabId).classList.add('active');
    document.getElementById('btn-tab-' + tabId).classList.add('active');
  }

  function showAdminPrompt() {
    const p = prompt(""); 
    if (p === "8591") {
      user = { name: "Manager", pwd: "8591", isManager: true };
      localStorage.setItem('asahi_user', JSON.stringify(user));
      initApp();
    } else if (p !== null && p !== "") {
      alert("密碼錯誤");
    }
  }

  function handleLogin() {
    const n = document.getElementById('login-name').value;
    const p = document.getElementById('login-pwd').value;
    if(!n || !p) return alert("請輸入完整資訊");
    callGAS({ mode:'login', name:n, password:p }, res => {
      if(res.status==='success'){ user={name:n, pwd:p, isManager:res.isManager}; localStorage.setItem('asahi_user', JSON.stringify(user)); initApp(); }
      else alert("密碼錯誤");
    });
  }

  function initApp() {
    const saved = localStorage.getItem('asahi_user');
    if(saved){ 
      user=JSON.parse(saved); 
      document.getElementById('login-ui').style.display='none'; 
      document.getElementById('main-ui').style.display='flex'; 
      refreshData(); 
    }
  }

  function refreshData() {
    document.getElementById('welcome-msg').innerText = "你好，" + user.name;
    if(user.isManager) document.getElementById('mgr-lock-btn').style.display='block';
    callGAS({ mode:'get_month_data', name:user.name, password:user.pwd }, res => { 
      db = res; 
      document.getElementById('mgr-lock-btn').innerText = db.locked ? "🔓 解鎖班表" : "🔒 鎖定班表";
      renderCalendar(); 
    });
  }

  function renderCalendar() {
    const grid = document.getElementById('cal-grid'); grid.innerHTML = "";
    const y = currentDisplayDate.getFullYear(), m = currentDisplayDate.getMonth();
    document.getElementById('cal-month-title').innerText = `${y}年 ${m+1}月`;
    const firstDay = new Date(y, m, 1).getDay(), days = new Date(y, m+1, 0).getDate();
    
    for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
    
    const today = new Date();
    for(let i=1; i<=days; i++) {
      const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      const div = document.createElement('div'); div.className = 'cal-day';
      
      if (i === today.getDate() && m === today.getMonth() && y === today.getFullYear()) {
          div.classList.add('today');
      }
      if(selectedDates.includes(dStr)) div.classList.add('selected');
      
      const config = db.config.find(c => formatDate(c[0])===dStr);
      const takers = db.schedule.filter(s => formatDate(s[1])===dStr);
      const unavails = db.unavail.filter(u => formatDate(u[1])===dStr);
      const eventName = config ? config[2] : "";
      const slots = config ? JSON.parse(config[1]) : getDefaultSlots(new Date(dStr).getDay());
      
      let html = `<div class="event-top">${eventName}</div>`;
      html += `<div class="date-num">${i}</div>`;
      
      html += `<div class="slot-container">`;
      slots.forEach((s, idx) => {
        const taker = takers[idx]; 
        html += `<div class="slot-bar ${taker ? 'occupied' : ''}">${taker ? taker[3] : ''}</div>`;
      });
      html += `</div>`;
      
      html += `<div class="unavail-container">`;
      unavails.forEach(u => html += `<div class="unavail-tag">❌ ${u[2]}</div>`);
      html += `</div>`;
      
      div.innerHTML = html;
      div.onclick = () => toggleSelect(dStr);
      grid.appendChild(div);
    }
  }

  function toggleSelect(date) {
    const idx = selectedDates.indexOf(date);
    if(idx > -1) selectedDates.splice(idx, 1); else selectedDates.push(date);
    document.getElementById('selected-bar').style.display = selectedDates.length > 0 ? 'block' : 'none';
    document.getElementById('sel-count-text').innerText = `已選擇 ${selectedDates.length} 天`;
  }

  function showBatchAction() {
    const body = document.getElementById('modal-body');
    document.getElementById('modal-date').innerText = "處理 " + selectedDates.length + " 天";
    let html = "";
    if(user.isManager) {
      html = `活動名稱: <input id="mgr-event" placeholder="例如: SALE">
              需求人數: <input id="mgr-num" type="number" value="2">
              上班時間: <input id="mgr-time" value="11:00-18:00">
              <button class="btn" style="background:var(--main-brown); color:white;" onclick="mgrBatchSet()">設定活動日</button>`;
    } else {
      html = `<button class="btn" style="background:var(--accent-green); color:white;" onclick="staffBatchAction('grab')">排班</button>
              <button class="btn" style="background:#BC8F8F; color:white;" onclick="staffBatchAction('unavail')">不能排班</button>
              <button class="btn" style="background:#EEE; color:#666;" onclick="staffBatchAction('cancel_unavail')">清除標記 (變回空白)</button>`;
    }
    body.innerHTML = html;
    document.getElementById('action-modal').style.display = 'flex';
  }

  function staffBatchAction(action) {
    if(db.locked && !user.isManager) return alert("班表已鎖定");
    callGAS({ mode:'staff_action', name:user.name, password:user.pwd, dates:selectedDates.join(','), action:action }, () => {
      alert("已完成登記"); selectedDates=[]; document.getElementById('selected-bar').style.display='none'; closeModal(); refreshData();
    });
  }

  function mgrBatchSet() {
    const ev = document.getElementById('mgr-event').value;
    const num = document.getElementById('mgr-num').value;
    const time = document.getElementById('mgr-time').value;
    const slots = Array.from({length: parseInt(num)}, () => ({time: time}));
    callGAS({ mode:'manager_set_config', name:user.name, password:user.pwd, dates:selectedDates.join(','), slots:JSON.stringify(slots), eventName:ev }, () => {
      alert("已完成設定"); selectedDates=[]; document.getElementById('selected-bar').style.display='none'; closeModal(); refreshData();
    });
  }

  function toggleLock() {
    callGAS({ mode:'set_lock', name:user.name, password:user.pwd, lock: !db.locked }, refreshData);
  }

  function doPunch(type) {
    navigator.geolocation.getCurrentPosition(pos => {
      callGAS({ mode:'punch', name:user.name, password:user.pwd, type:type, lat:pos.coords.latitude, lon:pos.coords.longitude }, res => { alert(res.message); });
    }, () => alert("請開啟GPS定位"));
  }

  function callGAS(p, cb){
    const cbN = 'cb'+Date.now(); window[cbN] = d => { cb(d); delete window[cbN]; document.body.removeChild(s); };
    let url = GAS_URL + "?callback="+cbN; for(let k in p) url += `&${k}=${encodeURIComponent(p[k])}`;
    const s = document.createElement('script'); s.src = url; document.body.appendChild(s);
  }
  function changeMonth(o){ currentDisplayDate.setMonth(currentDisplayDate.getMonth()+o); renderCalendar(); }
  function closeModal(){ document.getElementById('action-modal').style.display='none'; }
  function formatDate(d){ try { return new Date(d).toISOString().split('T')[0]; } catch(e) { return ""; } }
  function logout(){ localStorage.clear(); location.reload(); }
  function getDefaultSlots(day) {
    const count = (day >= 2 && day <= 4) ? 1 : 2;
    return Array.from({length: count}, () => ({time: "11:00-18:00"}));
  }
  document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
