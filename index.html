<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Asahi Cafe 旗艦系統</title>
  <style>
    :root { --main-brown: #8D6E63; --accent-green: #6B8E23; --bg: #FAF9F6; }
    body { font-family: -apple-system, "PingFang TC", sans-serif; background: var(--bg); color: #5D4037; margin: 0; padding: 15px; }
    .card { background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 480px; margin: auto; }
    .btn { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; }
    .btn:active { transform: scale(0.98); opacity: 0.9; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 15px 0; }
    .cal-day { padding: 15px 2px; background: #FFF; border: 1px solid #F0EFEF; border-radius: 10px; font-size: 14px; text-align: center; cursor: pointer; min-height: 50px; }
    .cal-day.today { border: 2px solid var(--accent-green); }
    .cal-day.other-month { opacity: 0.3; pointer-events: none; }
    .badge { font-size: 10px; color: var(--main-brown); margin-top: 4px; display: block; font-weight: bold; }
    .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; box-sizing:border-box; }
    .modal-content { background:white; width:100%; max-width:380px; border-radius:20px; padding:25px; max-height: 80vh; overflow-y: auto; }
    input, select { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #DDD; font-size:16px; }
    .admin-link { color: #EEE; font-size: 10px; text-decoration: none; margin-top: 40px; display: inline-block; }
    .month-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 10px; }
    .nav-btn { background: none; border: 1px solid #DDD; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; color: var(--main-brown); }
    .hist-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #F5F5F5; font-size: 14px; }
  </style>
</head>
<body>

<div class="card">
  <div id="login-ui">
    <h2 style="margin-top:0;">☕ Asahi Cafe</h2>
    <p style="color:#8D6E63; font-size:14px;">請選擇身分並輸入密碼</p>
    <select id="login-name">
      <option value="">選擇員工</option>
      <option value="Gino">Gino</option>
      <option value="陳品潔">陳品潔</option>
      <option value="Izumi">Izumi</option>
      <option value="山本勇太">山本勇太</option>
    </select>
    <input type="password" id="login-pwd" placeholder="密碼" inputmode="numeric">
    <button class="btn" style="background:var(--main-brown); color:white;" onclick="handleLogin('staff')">登入系統</button>
    <center><a href="#" class="admin-link" onclick="showAdminLogin()">Admin Access</a></center>
  </div>

  <div id="admin-login-ui" style="display:none;">
    <h3>🔒 店長管理模式</h3>
    <input type="password" id="admin-pwd" placeholder="管理密碼 8591" inputmode="numeric">
    <button class="btn" style="background:#333; color:white;" onclick="handleLogin('manager')">驗證進入</button>
    <button class="btn" style="background:#EEE" onclick="location.reload()">返回</button>
  </div>

  <div id="main-ui" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <h3 id="welcome-msg" style="margin:0;">你好</h3>
      <button id="mgr-lock-btn" class="btn" style="width:100px; padding:8px; font-size:12px; display:none;" onclick="toggleLock()"></button>
    </div>
    
    <div id="punch-section" style="display:flex; gap:10px;">
      <button class="btn" style="background:var(--accent-green); color:white;" onclick="doPunch('上班')">🌅 上班</button>
      <button class="btn" style="background:#BC8F8F; color:white;" onclick="doPunch('下班')">🌇 下班</button>
    </div>

    <div id="calendar-section" style="margin-top:25px; border-top:1px solid #EEE; padding-top:20px;">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <h4 id="cal-month-title" style="margin:0; min-width: 120px; text-align: center;">載入中...</h4>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      </div>
      <div class="calendar" id="cal-grid"></div>
    </div>

    <div id="hist-section" style="margin-top:20px; border-top:1px solid #EEE; padding-top:20px;">
      <h4 style="margin:0 0 10px 0;">近期紀錄</h4>
      <div id="hist-content"></div>
    </div>

    <button class="btn" style="background:#F5F5F5; color:#999; font-size:14px; margin-top:30px;" onclick="logout()">👤 登出 / 更換使用者</button>
  </div>
</div>

<div id="action-modal" class="modal">
  <div class="modal-content">
    <h3 id="modal-date" style="margin-top:0;"></h3>
    <div id="modal-body"></div>
    <button class="btn" style="background:#EEE; margin-top:15px;" onclick="closeModal()">關閉</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwQTu5RDDcYKFmwcbUsAdE1mN-YbUeIG0vQvfPj3p3meqJ52UG1ulY7PA7IyQof5oYU/exec"; 
  let user = { name: "", pwd: "", isManager: false };
  let db = { config: [], schedule: [], unavail: [], locked: false };
  let currentDisplayDate = new Date(); // 當前顯示的月份

  function showAdminLogin() {
    document.getElementById('login-ui').style.display = 'none';
    document.getElementById('admin-login-ui').style.display = 'block';
  }

  function handleLogin(type) {
    const n = (type === 'manager') ? 'Manager' : document.getElementById('login-name').value;
    const p = (type === 'manager') ? document.getElementById('admin-pwd').value : document.getElementById('login-pwd').value;
    if(!p) return alert("請輸入密碼");
    
    callGAS({ mode: 'login', name: n, password: p }, (res) => {
      if (res.status === 'success') {
        user = { name: n, pwd: p, isManager: res.isManager };
        localStorage.setItem('asahi_user', JSON.stringify(user));
        location.reload(); 
      } else { alert("驗證失敗"); }
    });
  }

  function initApp() {
    const saved = localStorage.getItem('asahi_user');
    if (saved) {
      user = JSON.parse(saved);
      document.getElementById('login-ui').style.display = 'none';
      document.getElementById('main-ui').style.display = 'block';
      refreshData();
    }
  }

  function refreshData() {
    document.getElementById('welcome-msg').innerText = "你好，" + user.name;
    if (user.isManager) document.getElementById('mgr-lock-btn').style.display = 'block';
    
    callGAS({ mode: 'get_month_data', name: user.name, password: user.pwd }, (res) => {
      db = res;
      document.getElementById('mgr-lock-btn').innerText = db.locked ? "🔓 解鎖班表" : "🔒 鎖定班表";
      renderCalendar();
      fetchHistory();
    });
  }

  function changeMonth(offset) {
    currentDisplayDate.setMonth(currentDisplayDate.getMonth() + offset);
    renderCalendar();
  }

  function renderCalendar() {
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = "";
    
    const year = currentDisplayDate.getFullYear();
    const month = currentDisplayDate.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    document.getElementById('cal-month-title').innerText = `${year}年 ${month + 1}月`;
    
    // 填充月初空白
    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'cal-day other-month';
        grid.appendChild(empty);
    }

    const today = new Date();
    for (let i = 1; i <= daysInMonth; i++) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
      const div = document.createElement('div');
      div.className = 'cal-day';
      if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) div.classList.add('today');
      
      const config = db.config.find(c => formatDate(c[0]) === dateStr);
      const slots = config ? JSON.parse(config[1]) : getDefaultSlots(new Date(dateStr).getDay());
      const takers = db.schedule.filter(s => formatDate(s[1]) === dateStr);
      
      div.innerHTML = `<b>${i}</b><span class="badge">${takers.length}/${slots.length}人</span>`;
      div.onclick = () => showModal(dateStr, slots, takers);
      grid.appendChild(div);
    }
  }

  function showModal(date, slots, takers) {
    const body = document.getElementById('modal-body');
    document.getElementById('modal-date').innerText = date;
    let html = "";

    if (user.isManager) {
      html += `<h4 style="color:var(--main-brown)">店長佈局設定</h4>`;
      slots.forEach((s, idx) => {
        const t = takers.find(tk => tk[2] == idx);
        html += `<div style="padding:10px; border-bottom:1px solid #EEE;">
          <b>名額 ${idx+1}:</b> ${s.time} <br> 
          人員: ${t ? t[3] : '<span style="color:red">空缺</span>'}
          ${t ? `<button onclick="staffAction('${date}', 'remove_staff', ${idx})" style="float:right">移除</button>` : ''}
        </div>`;
      });
      html += `<button class="btn" style="background:#F5F5F5" onclick="mgrConfigDate('${date}')">⚙️ 修改名額/時間</button>`;
    } else {
      html += `<h4>今日班表</h4>`;
      slots.forEach((s, idx) => {
        const t = takers.find(tk => tk[2] == idx);
        if (t) html += `<div class="btn" style="background:#F5F5F5; color:#666; text-align:left;">✅ ${t[3]} (${s.time})</div>`;
        else if (!db.locked) html += `<button class="btn" style="background:var(--accent-green); color:white;" onclick="staffAction('${date}', 'grab', ${idx})">🙋 搶班: ${s.time}</button>`;
      });

      const unavails = db.unavail.filter(u => formatDate(u[1]) === date);
      html += `<h4 style="margin-top:20px;">不可支援名單</h4>`;
      unavails.forEach(u => html += `<div style="color:red; margin-bottom:5px;">❌ ${u[2]}</div>`);
      
      if (!db.locked) {
        const me = unavails.find(u => u[2] === user.name);
        if (me) html += `<button class="btn" style="background:#EEE" onclick="staffAction('${date}', 'cancel_unavail')">我有空了，取消標記</button>`;
        else html += `<button class="btn" style="background:#FFF0F0; color:red;" onclick="staffAction('${date}', 'unavail')">這天我不能上班</button>`;
      }
    }
    body.innerHTML = html;
    document.getElementById('action-modal').style.display = 'flex';
  }

  function mgrConfigDate(date) {
    const num = prompt("需要幾個人？", "2");
    const time = prompt("預設時間？", "11:00-18:00");
    if (!num) return;
    const slots = Array.from({length: parseInt(num)}, () => ({time: time}));
    callGAS({ mode: 'manager_set_config', name: user.name, password: user.pwd, date: date, slots: JSON.stringify(slots) }, () => { closeModal(); refreshData(); });
  }

  function staffAction(date, action, slotId = "") {
    callGAS({ mode: 'staff_action', name: user.name, password: user.pwd, date: date, action: action, slotId: slotId }, () => { closeModal(); refreshData(); });
  }

  function toggleLock() {
    callGAS({ mode: 'set_lock', name: user.name, password: user.pwd, lock: !db.locked }, refreshData);
  }

  function doPunch(type) {
    navigator.geolocation.getCurrentPosition(pos => {
      callGAS({ mode: 'punch', name: user.name, password: user.pwd, type: type, lat: pos.coords.latitude, lon: pos.coords.longitude }, res => {
        alert(res.message); refreshData();
      });
    }, () => alert("定位失敗"), {enableHighAccuracy: true});
  }

  function fetchHistory() {
    callGAS({ mode: 'get_history', name: user.name, password: user.pwd }, (res) => {
      let html = "";
      if(res.data) res.data.forEach(h => html += `<div class="hist-item"><span>${h.date}</span><span>${h.in} - ${h.out}</span></div>`);
      document.getElementById('hist-content').innerHTML = html || "暫無紀錄";
    });
  }

  function getDefaultSlots(day) {
    const count = (day >= 2 && day <= 4) ? 1 : 2;
    return Array.from({length: count}, () => ({time: "11:00-18:00"}));
  }

  function callGAS(p, cb) {
    const cbN = 'cb' + Date.now();
    window[cbN] = (d) => { cb(d); delete window[cbN]; document.body.removeChild(s); };
    let url = GAS_URL + "?callback=" + cbN;
    for (let k in p) url += `&${k}=${encodeURIComponent(p[k])}`;
    const s = document.createElement('script'); s.src = url; document.body.appendChild(s);
  }

  function formatDate(d) { return new Date(d).toISOString().split('T')[0]; }
  function closeModal() { document.getElementById('action-modal').style.display = 'none'; }
  function logout() { localStorage.clear(); location.reload(); }
  
  document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
