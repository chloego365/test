<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Asahi Cafe 旗艦系統</title>
  <style>
    :root { --main-brown: #8D6E63; --accent-green: #6B8E23; --bg: #FAF9F6; --light-pink: #FFE4E1; --gray-bar: #E0E0E0; }
    body { font-family: -apple-system, "PingFang TC", sans-serif; background: var(--bg); color: #5D4037; margin: 0; padding: 10px; }
    .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 500px; margin: auto; min-height: 90vh; display: flex; flex-direction: column; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; }
    
    /* 頁籤 */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 12px; border: 1px solid #DDD; background: #FFF; border-radius: 12px; font-weight: bold; color: #999; cursor: pointer; font-size: 15px; }
    .tab-btn.active { background: var(--main-brown); color: #FFF; border-color: var(--main-brown); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* 月曆 */
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin: 15px 0; }
    .cal-day { background: #FFF; border: 1px solid #F0F0F0; border-radius: 8px; min-height: 95px; padding: 4px 2px; cursor: pointer; display: flex; flex-direction: column; align-items: center; position: relative; }
    
    /* 今日與選取 */
    .cal-day.today { background: #FFFDE7; border: 2px solid #FFD54F; }
    .cal-day.selected { background-color: #D7CCC8 !important; border: 2px solid #5D4037 !important; box-shadow: 0 0 5px rgba(93,64,55,0.4) !important; }
    
    /* 格子內容對齊 */
    .event-top { font-size: 9px; color: #F57C00; font-weight: bold; height: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; width: 100%; margin-bottom: 2px; }
    .date-num { font-weight: bold; font-size: 14px; margin-bottom: 4px; color: #333; }
    .slot-container { width: 95%; display: flex; flex-direction: column; gap: 2px; }
    .slot-bar { height: 16px; background: var(--gray-bar); border-radius: 4px; font-size: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; color: transparent; }
    .slot-bar.occupied { background: #EFEBE9; color: var(--main-brown); font-weight: bold; border: 1px solid #D7CCC8; }
    .unavail-container { width: 95%; display: flex; flex-direction: column; gap: 2px; margin-top: auto; padding-top: 5px; } /* 靠下對齊 */
    .unavail-tag { background: var(--light-pink); font-size: 9px; color: #D81B60; padding: 2px 0; border-radius: 3px; text-align: center; }
    
    /* 操作面板 (下方防呆按鈕) */
    .action-panel { background: #F9F9F9; border: 1px solid #E0E0E0; border-radius: 12px; padding: 15px; margin-top: 15px; }
    .action-btn { transition: 0.2s; opacity: 0.4; pointer-events: none; margin: 4px 0; }
    .action-btn.active { opacity: 1; pointer-events: auto; }
    input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #DDD; font-size: 14px; box-sizing: border-box; }
  </style>
</head>
<body>

<div class="card">
  <div id="login-ui">
    <h2 style="text-align:center; margin-bottom:30px;">☕ Asahi Cafe</h2>
    <select id="login-name" style="width:100%; padding:12px; border-radius:8px; border:1px solid #DDD; margin-bottom:10px; font-size:15px;">
      <option value="">選擇人員</option>
      <option value="Gino">Gino</option>
      <option value="陳品潔">陳品潔</option>
      <option value="Izumi">Izumi</option>
      <option value="山本勇太">山本勇太</option>
    </select>
    <input type="password" id="login-pwd" placeholder="輸入 4 位數密碼" inputmode="numeric">
    <button class="btn" style="background:var(--main-brown); color:white; margin-top:10px;" onclick="handleLogin('staff')">進入系統</button>
    <div style="text-align:center; margin-top:60px;">
        <span style="color:#F5F5F5; font-size:10px; cursor:pointer;" onclick="showAdminLogin()">Admin</span>
    </div>
  </div>

  <div id="admin-login-ui" style="display:none; text-align:center;">
    <h2 style="margin-bottom:30px; color:var(--main-brown);">🔒 店長模式</h2>
    <input type="password" id="admin-pwd" placeholder="輸入管理密碼" inputmode="numeric">
    <button class="btn" style="background:#333; color:white; margin-top:10px;" onclick="handleLogin('manager')">進入管理</button>
    <button class="btn" style="background:#EEE; color:#666; margin-top:10px;" onclick="backToLogin()">返回</button>
  </div>

  <div id="main-ui" style="display:none; flex-grow: 1; flex-direction: column;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
      <h3 id="welcome-msg" style="margin:0;">你好</h3>
      <button id="mgr-lock-btn" class="btn" style="width:90px; padding:6px; font-size:11px; display:none; margin:0;" onclick="toggleLock()"></button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="btn-tab-punch" onclick="switchTab('punch')">📍 出勤打卡</button>
      <button class="tab-btn" id="btn-tab-cal" onclick="switchTab('cal')">📅 月曆排班</button>
    </div>

    <div id="tab-punch" class="tab-content active" style="margin-top: 20px;">
      <button class="btn" style="background:var(--accent-green); color:white; padding: 25px; font-size: 18px;" onclick="doPunch('上班')">🌅 上班打卡</button>
      <button class="btn" style="background:#BC8F8F; color:white; padding: 25px; font-size: 18px; margin-top: 15px;" onclick="doPunch('下班')">🌇 下班打卡</button>
      <p style="text-align: center; color: #999; font-size: 12px; margin-top: 25px;">請確保您在店面附近進行打卡</p>
    </div>

    <div id="tab-cal" class="tab-content">
      <div style="display:flex; justify-content:center; align-items:center; gap:25px; margin-bottom:5px;">
        <button onclick="changeMonth(-1)" style="border:none; background:none; font-size:22px; cursor:pointer; color:var(--main-brown);">◀</button>
        <h4 id="cal-month-title" style="margin:0; min-width: 110px; text-align:center;"></h4>
        <button onclick="changeMonth(1)" style="border:none; background:none; font-size:22px; cursor:pointer; color:var(--main-brown);">▶</button>
      </div>
      
      <div class="calendar" id="cal-grid"></div>

      <div class="action-panel">
        <div id="sel-count-text" style="font-weight:bold; color:#999; margin-bottom:12px; text-align:center; font-size:14px;">請先點選上方日期</div>
        
        <div id="staff-actions" style="display:none; flex-direction:column;">
          <button class="btn action-btn staff-btn" style="background:var(--accent-green); color:white;" onclick="staffBatchAction('grab')">✅ 確定排班</button>
          <button class="btn action-btn staff-btn" style="background:#BC8F8F; color:white;" onclick="staffBatchAction('unavail')">❌ 不能排班</button>
          <button class="btn action-btn staff-btn" style="background:#E0E0E0; color:#555;" onclick="staffBatchAction('cancel_unavail')">🧹 清除標記 (變回空白)</button>
        </div>

        <div id="mgr-actions" style="display:none; flex-direction:column;">
          <input id="mgr-event" placeholder="活動名稱 (例: SALE)">
          <div style="display:flex; gap:8px;">
            <input id="mgr-num" type="number" placeholder="人數" value="2" style="flex:1;">
            <input id="mgr-time" placeholder="時間" value="11:00-18:00" style="flex:2;">
          </div>
          <button class="btn action-btn mgr-btn" style="background:var(--main-brown); color:white;" onclick="mgrBatchSet()">確認設定</button>
        </div>
      </div>
    </div>

    <button class="btn" style="background:#F5F5F5; color:#999; margin-top:auto;" onclick="logout()">登出</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwQTu5RDDcYKFmwcbUsAdE1mN-YbUeIG0vQvfPj3p3meqJ52UG1ulY7PA7IyQof5oYU/exec"; 
  let user = { name: "", pwd: "", isManager: false };
  let db = { config: [], schedule: [], unavail: [], locked: false };
  let currentDisplayDate = new Date();
  let selectedDates = [];

  function switchTab(tabId) {
    document.getElementById('tab-punch').classList.remove('active');
    document.getElementById('tab-cal').classList.remove('active');
    document.getElementById('btn-tab-punch').classList.remove('active');
    document.getElementById('btn-tab-cal').classList.remove('active');
    document.getElementById('tab-' + tabId).classList.add('active');
    document.getElementById('btn-tab-' + tabId).classList.add('active');
  }

  function showAdminLogin() {
    document.getElementById('login-ui').style.display = 'none';
    document.getElementById('admin-login-ui').style.display = 'block';
  }

  function backToLogin() {
    document.getElementById('admin-login-ui').style.display = 'none';
    document.getElementById('login-ui').style.display = 'block';
  }

  function handleLogin(type) {
    const n = (type === 'manager') ? 'Manager' : document.getElementById('login-name').value;
    const p = (type === 'manager') ? document.getElementById('admin-pwd').value : document.getElementById('login-pwd').value;
    if(!p) return alert("請輸入密碼");
    
    callGAS({ mode:'login', name:n, password:p }, res => {
      if(res.status==='success'){ 
        user={name:n, pwd:p, isManager:res.isManager}; 
        localStorage.setItem('asahi_user', JSON.stringify(user)); 
        initApp(); 
      } else { alert("密碼錯誤"); }
    });
  }

  function initApp() {
    const saved = localStorage.getItem('asahi_user');
    if(saved){ 
      user=JSON.parse(saved); 
      document.getElementById('login-ui').style.display='none'; 
      document.getElementById('admin-login-ui').style.display='none'; 
      document.getElementById('main-ui').style.display='flex'; 
      refreshData(); 
    }
  }

  function refreshData() {
    document.getElementById('welcome-msg').innerText = "你好，" + user.name;
    if(user.isManager) {
      document.getElementById('mgr-lock-btn').style.display='block';
      document.getElementById('mgr-actions').style.display='flex';
      document.getElementById('staff-actions').style.display='none';
    } else {
      document.getElementById('mgr-actions').style.display='none';
      document.getElementById('staff-actions').style.display='flex';
    }
    
    callGAS({ mode:'get_month_data', name:user.name, password:user.pwd }, res => { 
      db = res; 
      document.getElementById('mgr-lock-btn').innerText = db.locked ? "🔓 解鎖班表" : "🔒 鎖定班表";
      renderCalendar(); 
    });
  }

  function renderCalendar() {
    const grid = document.getElementById('cal-grid'); grid.innerHTML = "";
    const y = currentDisplayDate.getFullYear(), m = currentDisplayDate.getMonth();
    document.getElementById('cal-month-title').innerText = `${y}年 ${m+1}月`;
    const firstDay = new Date(y, m, 1).getDay(), days = new Date(y, m+1, 0).getDate();
    
    for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
    
    const today = new Date();
    for(let i=1; i<=days; i++) {
      const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
      const div = document.createElement('div'); div.className = 'cal-day';
      
      if (i === today.getDate() && m === today.getMonth() && y === today.getFullYear()) div.classList.add('today');
      if (selectedDates.includes(dStr)) div.classList.add('selected');
      
      const config = db.config.find(c => formatDate(c[0])===dStr);
      const takers = db.schedule.filter(s => formatDate(s[1])===dStr);
      const unavails = db.unavail.filter(u => formatDate(u[1])===dStr);
      const eventName = config ? config[2] : "";
      const slots = config ? JSON.parse(config[1]) : getDefaultSlots(new Date(dStr).getDay());
      
      let html = `<div class="event-top">${eventName}</div>`;
      html += `<div class="date-num">${i}</div>`;
      
      // 上層：灰條與排班人員
      html += `<div class="slot-container">`;
      slots.forEach((s, idx) => {
        const taker = takers[idx]; 
        html += `<div class="slot-bar ${taker ? 'occupied' : ''}">${taker ? taker[3] : ''}</div>`;
      });
      html += `</div>`;
      
      // 下層：不能排班標記
      html += `<div class="unavail-container">`;
      unavails.forEach(u => html += `<div class="unavail-tag">❌ ${u[2]}</div>`);
      html += `</div>`;
      
      div.innerHTML = html;
      div.onclick = () => toggleSelect(dStr);
      grid.appendChild(div);
    }
    updateActionPanel();
  }

  function toggleSelect(date) {
    const idx = selectedDates.indexOf(date);
    if(idx > -1) selectedDates.splice(idx, 1); else selectedDates.push(date);
    renderCalendar();
  }

  // 防呆：有選日期才亮起按鈕
  function updateActionPanel() {
    const isSelected = selectedDates.length > 0;
    const txt = document.getElementById('sel-count-text');
    txt.innerText = isSelected ? `已選擇 ${selectedDates.length} 天` : "請先點選上方日期";
    txt.style.color = isSelected ? "var(--main-brown)" : "#999";
    
    document.querySelectorAll('.action-btn').forEach(btn => {
      if(isSelected) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  function staffBatchAction(action) {
    if(db.locked && !user.isManager) return alert("班表已鎖定");
    callGAS({ mode:'staff_action', name:user.name, password:user.pwd, dates:selectedDates.join(','), action:action }, () => {
      alert("已完成登記"); selectedDates=[]; refreshData();
    });
  }

  function mgrBatchSet() {
    const ev = document.getElementById('mgr-event').value;
    const num = document.getElementById('mgr-num').value;
    const time = document.getElementById('mgr-time').value;
    const slots = Array.from({length: parseInt(num)}, () => ({time: time}));
    callGAS({ mode:'manager_set_config', name:user.name, password:user.pwd, dates:selectedDates.join(','), slots:JSON.stringify(slots), eventName:ev }, () => {
      alert("已完成設定"); selectedDates=[]; refreshData();
    });
  }

  function toggleLock() {
    callGAS({ mode:'set_lock', name:user.name, password:user.pwd, lock: !db.locked }, refreshData);
  }

  function doPunch(type) {
    navigator.geolocation.getCurrentPosition(pos => {
      callGAS({ mode:'punch', name:user.name, password:user.pwd, type:type, lat:pos.coords.latitude, lon:pos.coords.longitude }, res => { alert(res.message); });
    }, () => alert("請開啟GPS定位"));
  }

  function callGAS(p, cb){
    const cbN = 'cb'+Date.now(); window[cbN] = d => { cb(d); delete window[cbN]; document.body.removeChild(s); };
    let url = GAS_URL + "?callback="+cbN; for(let k in p) url += `&${k}=${encodeURIComponent(p[k])}`;
    const s = document.createElement('script'); s.src = url; document.body.appendChild(s);
  }
  function changeMonth(o){ currentDisplayDate.setMonth(currentDisplayDate.getMonth()+o); selectedDates=[]; renderCalendar(); }
  
  // 本地時區轉換，解決 5/1 變 4/30 的問題
  function formatDate(d){ 
    try { 
      const dt = new Date(d);
      if(isNaN(dt)) return "";
      const year = dt.getFullYear();
      const month = String(dt.getMonth() + 1).padStart(2, '0');
      const day = String(dt.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    } catch(e) { return ""; } 
  }
  
  function logout(){ localStorage.clear(); location.reload(); }
  function getDefaultSlots(day) {
    const count = (day >= 2 && day <= 4) ? 1 : 2;
    return Array.from({length: count}, () => ({time: "11:00-18:00"}));
  }
  document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
